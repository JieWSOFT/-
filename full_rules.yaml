# MediaTidy 综合规则文件
# 来源: shenxianmq/GroupRe.txt + shutu777/custom_words.txt + custom_rendering_words.txt + custom_group.txt
# 生成时间: 2026-03-03

# ==================== 预处理规则 ====================
preprocess:
  # --- 容易误识别的年份标题 TMDB绑定 ---
  - match: "^1923"
    tmdb: 157744
    type: tv
  - match: "^1883"
    tmdb: 118357
    type: tv
  - match: "^1942"
    tmdb: 130063
    type: tv
  - match: "^1992.*?2015"
    tmdb: 62459
    type: tv
  - match: "^2012\\."
    replace: "二零一二."
  - match: "^1917\\."
    replace: "一九一七."
  - match: "^2046\\."
    tmdb: 844
    type: movie

  # --- 数字开头容易混淆的标题 ---
  - match: "^12\\.Monkeys"
    replace: "十二猴子."
  - match: "11\\.Rebels"
    tmdb: 1310682
    type: movie
  - match: "119\\.Emergency\\.Call\\."
    replace: "119紧急呼叫."
  - match: "101\\.Marriages"
    replace: "101次抢婚"

  # --- 特殊标题 TMDB绑定 ---
  - match: "Madame\\.Web"
    tmdb: 634492
    type: movie
  - match: "F1：狂飙飞车"
    tmdb: 911430
    type: movie
  - match: "Move to Heaven：我是遗物整理师"
    tmdb: 96571
    type: tv
  - match: "ONE：高中英雄们"
    tmdb: 233219
    type: tv
  - match: "Perfect World"
    tmdb: 124003
    type: tv
  - match: "成何体统 \\(2024\\)"
    tmdb: 256783
    type: tv
  - match: "成何体统 \\(2026\\)"
    tmdb: 280632
    type: tv
  - match: "Mother.*2009"
    tmdb: 30018
    type: movie
  - match: "Resurrection.*2025"
    tmdb: 878608
    type: movie
  - match: "超时空要塞\\sFrontier"
    tmdb: 5857
    type: tv
  - match: "正义使者\\s*-\\s*我的英雄学院之非法英雄"
    tmdb: 280110
    type: tv

  # --- 少女与战车 最终章系列 ---
  - match: "少女与战车 最终章 ～第1话～"
    tmdb: 474659
    type: movie
  - match: "少女与战车 最终章 ～第2话～"
    tmdb: 496891
    type: movie
  - match: "少女与战车 最终章 ～第3话～"
    tmdb: 746880
    type: movie
  - match: "少女与战车 最终章 ～第4话～"
    tmdb: 1051192
    type: movie

  # --- 教父系列 ---
  - match: "教父\\.1\\."
    tmdb: 238
    type: movie
  - match: "The\\.Godfather\\.Part\\.I(?=[\\W_]|$)"
    tmdb: 242
    type: movie
  - match: "The\\.Godfather\\.Part\\.1"
    tmdb: 242
    type: movie
  - match: "教父\\.2\\."
    tmdb: 240
    type: movie
  - match: "The\\.Godfather\\.Part\\.II"
    tmdb: 240
    type: movie
  - match: "The\\.Godfather\\.Part\\.2"
    tmdb: 240
    type: movie
  - match: "教父\\.3\\."
    tmdb: 242
    type: movie
  - match: "The\\.Godfather\\.Part\\.III"
    tmdb: 242
    type: movie
  - match: "The\\.Godfather\\.Part\\.3"
    tmdb: 242
    type: movie

  # --- 哈利波特系列 ---
  - match: "Harry\\.Potter\\.I(?=[\\W_]|$)"
    tmdb: 671
    type: movie
  - match: "哈利波特1"
    tmdb: 671
    type: movie
  - match: "Harry\\.Potter\\.II"
    tmdb: 672
    type: movie
  - match: "哈利波特2"
    tmdb: 672
    type: movie
  - match: "Harry\\.Potter\\.III"
    tmdb: 673
    type: movie
  - match: "哈利波特3"
    tmdb: 673
    type: movie
  - match: "Harry\\.Potter\\.IV"
    tmdb: 674
    type: movie
  - match: "哈利波特4"
    tmdb: 674
    type: movie
  - match: "Harry\\.Potter\\.V"
    tmdb: 675
    type: movie
  - match: "哈利波特5"
    tmdb: 675
    type: movie
  - match: "Harry\\.Potter\\.VI"
    tmdb: 767
    type: movie
  - match: "哈利波特6"
    tmdb: 767
    type: movie
  - match: "Harry\\.Potter\\.and\\.the\\.Deathly\\.Hallows.* Part\\.1"
    tmdb: 12444
    type: movie
  - match: "哈利波特与死亡圣器1"
    tmdb: 12444
    type: movie
  - match: "Harry\\.Potter\\.and\\.the\\.Deathly\\.Hallows.* Part\\.2"
    tmdb: 12445
    type: movie
  - match: "哈利波特与死亡圣器2"
    tmdb: 12445
    type: movie

  # --- 国漫 ---
  - match: "斗破苍宆"
    tmdb: 79481
    type: tv

  # --- 日漫长篇集数绑定 ---
  - match: "樱桃小丸子第二期.*?\\[(\\d{4})\\]"
    tmdb: 57775
    type: tv
    season: 2
    episode: "$1"
  - match: "Chibi Maruko-chan II.*?\\[(\\d+)\\]"
    tmdb: 57775
    type: tv
    season: 2
    episode: "$1"
  - match: "NewDoraemon哆啦A梦新番\\[(\\d+)\\]"
    tmdb: 65733
    type: tv
    season: 1
    episode: "$1"

  # --- 无效发布组标签清理 ---
  - match: "-SC(?=[\\W_]|$)"
  - match: "-SCDIY(?=[\\W_]|$)"
  - match: "-WF(?=[\\W_]|$)"
  - match: "-404(?=[\\W_]|$)"
  - match: "Ftang"

  # 注: 编码格式(H.264/x265)、分辨率(4K)、帧率(24fps)、位深(10bit)
  # 以及媒体平台名(Netflix.WEB-DL)均由 guessit 内置识别，无需预处理

  # --- 特殊格式文件名清理 ---
  - match: "^\\[\\d{4}]\\[(?:中国|大陆|台湾|香港|美国|英国|法国|德国|意大利|西班牙|俄罗斯|日本|韩国|印度|泰国|越南|澳大利亚|加拿大|新西兰|墨西哥|巴西|阿根廷|土耳其|捷克|匈牙利|波兰|瑞典|挪威|丹麦|芬兰)].*?\\[.*?GB](.*?)(LGNB)"
    replace: "$1$2"
  - match: "中配"
  - match: "日配"

